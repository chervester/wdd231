<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You for Joining</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header and Navigation -->
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="join.html">Join</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <h1>Thank You for Joining!</h1>
        <p>We appreciate your application to the Chamber of Commerce. Here are the details you provided:</p>

        <p><strong>First Name:</strong> <span id="first-name"></span></p>
        <p><strong>Last Name:</strong> <span id="last-name"></span></p>
        <p><strong>Email Address:</strong> <span id="email"></span></p>
        <p><strong>Mobile Number:</strong> <span id="phone"></span></p>
        <p><strong>Business Name:</strong> <span id="business-name"></span></p>
        <p><strong>Timestamp:</strong> <span id="timestamp"></span></p>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Chamber of Commerce. All rights reserved.</p>
    </footer>

    <script>
        // Get URL query parameters and display them
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('first-name').textContent = urlParams.get('first-name');
        document.getElementById('last-name').textContent = urlParams.get('last-name');
        document.getElementById('email').textContent = urlParams.get('email');
        document.getElementById('phone').textContent = urlParams.get('phone');
        document.getElementById('business-name').textContent = urlParams.get('business-name');
        document.getElementById('timestamp').textContent = urlParams.get('timestamp');
    </script>

</body>
</html>
